<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Redirect</title>
    <script>
        function redirectToLanguage() {
            const userLanguage = navigator.language || navigator.userLanguage;
            const preferredLanguage = userLanguage.startsWith('zh') ? 'zh-cn' : 'en-us';
            const targetUrl = `${preferredLanguage}/index.html`;
            window.location.href = targetUrl;
        }
        
        // 页面加载时执行重定向
        window.onload = redirectToLanguage;
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .loading {
            text-align: center;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Detecting language preferences...</p>
        <p>正在检测语言设置...</p>
    </div>
</body>
</html>
